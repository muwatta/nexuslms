apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexuslms-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexuslms-backend
  template:
    metadata:
      labels:
        app: nexuslms-backend
    spec:
      containers:
        - name: backend
          image: registry.example.com/nexuslms/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: nexuslms.settings.prod
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexuslms-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nexuslms-secrets
                  key: SECRET_KEY
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: nexuslms-secrets
                  key: REDIS_URL
            - name: ALLOWED_HOSTS
              value: "yourdomain.com"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
